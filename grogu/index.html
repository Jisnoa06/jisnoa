<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grogu's Galaxy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="stars"></div>

    <div class="container">
        <img
            id="grogu"
            src="https://64.media.tumblr.com/c0d8be3a1d2bfd58a1eb6c91baa5747b/5321eccd302337fc-fc/s400x600/f5ceaa1e1f5a5f705142e087ed9369c0eff52c63.gifv"
            alt="Grogu"
        >

        <h1>Grogu's Galaxy ✨</h1>

        <p id="message">
            Click the button to hear Grogu wisdom.
        </p>

        <div id="powerLevel">
            Force Level: 0
        </div>

        <div class="buttons">
            <button id="wisdomBtn">Talk to Grogu</button>
            <button id="forceBtn">Use The Force</button>
            <button id="themeBtn">Dark Side</button>
            
        </div>
    </div>
    <iframe
    id="music"
    width="0"
    height="0"
    src="https://www.youtube.com/embed/lET5OZmJesA?autoplay=1&loop=1&playlist=lET5OZmJesA"
    frameborder="0"
    allow="autoplay"
>
</iframe>
    <script src="script.js"></script>
</body>
</html>
